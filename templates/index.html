<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi LED Controller (HTMX)</title>
    <!-- Include HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #007bff;
            --led-off: #6c757d;
            --led-on: #ffc107;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #444;
        }

        .led-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background-color: var(--led-off);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .led-indicator.on {
            background-color: var(--led-on);
            box-shadow: 0 0 20px var(--led-on), inset 0 0 10px rgba(255,255,255,0.5);
        }

        .status-text {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .status-on { color: #ff9800; }
        .status-off { color: #6c757d; }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }
        
        /* Smooth transition for HTMX swaps */
        .htmx-added {
            opacity: 0;
        }
        .htmx-settling {
            opacity: 1;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pi LED Control</h1>
        
        <!-- This container is updated via HTMX polling -->
        {% include 'led_fragment.html' %}

        <!-- HTMX handles the post and updates the container immediately -->
        <button hx-post="/toggle" 
                hx-target="#led-container" 
                hx-swap="outerHTML">
            Toggle LED
        </button>
    </div>

</body>
</html>
